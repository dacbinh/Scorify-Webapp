<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 150" width="100%" height="100%">
  <g transform="translate(15, 10)">
    <!-- Letter S -->
    <path d="M65,48 C65,38 35,38 35,52 C35,66 65,64 65,78 C65,92 35,92 35,82" 
          fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Letter C -->
    <path d="M120,48 C110,38 92,38 82,52 C72,66 72,78 82,90 C92,102 110,102 120,92" 
          fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Letter O (Educational) -->
    <!-- Outer circle of O -->
    <circle cx="165" cy="70" r="26" fill="none" stroke="#FFFFFF" stroke-width="9" />
    <!-- Graduation Cap sitting on top -->
    <path d="M165,24 L188,34 L165,44 L142,34 Z" fill="#F05123" />
    <path d="M188,34 L188,48 M182,44 L182,48 M185,48 L193,48" fill="none" stroke="#F05123" stroke-width="2.5" stroke-linecap="round" />

    <!-- Letter R -->
    <path d="M215,100 L215,52 M215,66 C225,50 240,50 245,54" 
          fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Letter I (AI Based) -->
    <!-- Stem -->
    <path d="M275,100 L275,52" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" />
    <!-- Neural Node Dot -->
    <circle cx="275" cy="32" r="7" fill="#F05123" />
    <path d="M275,32 L259,20 M275,32 L291,20 M275,32 L275,12" fill="none" stroke="#F05123" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="259" cy="20" r="3.5" fill="#F05123" />
    <circle cx="291" cy="20" r="3.5" fill="#F05123" />
    <circle cx="275" cy="12" r="3.5" fill="#F05123" />

    <!-- Letter F -->
    <path d="M330,100 L330,48 C330,38 338,34 348,34 M315,52 L340,52" 
          fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Letter Y (Automation) -->
    <!-- Left branch of Y -->
    <path d="M365,52 L385,85" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right branch & Tail that loops and sweeps up to form a checkmark -->
    <path d="M405,52 L385,85 L385,102 C385,116 398,122 410,122 C426,122 436,110 442,95 L465,60" 
          fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Scanning Laser bar overlay across the checkmark tail -->
    <line x1="425" y1="75" x2="485" y2="75" stroke="#F05123" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round" />
    <path d="M455,80 L465,60 L480,90" fill="none" stroke="#F05123" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.85;" />
  </g>
</svg>
